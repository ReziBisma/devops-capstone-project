[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-package=service
cover-erase=1

[coverage:run]
branch = True
source = service

[coverage:report]
show_missing = True
fail_under = 80

[flake8]
max-line-length = 120
exclude = .git,__pycache__,venv
ignore = E203, W503

[pylint]
disable = C0114,C0115,C0116
max-line-length = 120